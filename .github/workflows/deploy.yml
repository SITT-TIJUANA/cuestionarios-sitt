name: Deploy frontend a GitHub Pages

on:
  push:
    branches: [main]
    paths: ['frontend/**']

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar dependencias
        working-directory: frontend
        run: npm install
      - name: Compilar
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - name: Copiar index.html a 404.html (para que funcionen las rutas de React)
        working-directory: frontend
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - id: deployment
        uses: actions/deploy-pages@v4
